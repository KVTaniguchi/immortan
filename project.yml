name: GastownController
options:
  bundleIdPrefix: com.kevintaniguchi
  deploymentTarget:
    macOS: "14.0"
targets:
  GastownController:
    type: application
    platform: macOS
    info:
      path: GastownController/Info.plist
      properties:
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: 1
        LSMinimumSystemVersion: 14.0.0
        NSHumanReadableCopyright: "Copyright © 2026 Kevin Taniguchi. All rights reserved."
        NSPrincipalClass: NSApplication
    settings:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: "Automatic"
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: "NO"
    sources:
      - path: GastownController
      - path: GastownController/Assets.xcassets
  GastownControllerTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: "Automatic"
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: "NO"
      GENERATE_INFOPLIST_FILE: "YES"
    sources:
      - path: GastownControllerTests
    dependencies:
      - target: GastownController
